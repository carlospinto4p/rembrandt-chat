# See https://pre-commit.com for more information:
# How to use:
#   - install pre-commit: pip install pre-commit
#   - install hooks: pre-commit install
#   - run hooks: pre-commit run --all-files (this is what CI does)
repos:
  - repo: local
    hooks:
      - id: ruff-fix
        name: Ruff Lint Fix
        entry: uvx ruff check --fix
        language: system
        types: [ python ]
      - id: ruff-format
        name: Ruff Format
        entry: uvx ruff format .
        language: system
        types: [python]
  - repo: local
    hooks:
      - id: check-changelog-headers
        name: Changelog header overwrite guard
        entry: .pre-commit-scripts/check_changelog_headers.sh
        language: script
        pass_filenames: false
        files: '(^|/)changelog\.md$|(^|/)changelog/.*\.md$'
