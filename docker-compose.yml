services:
  bot:
    build: .
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      DATABASE_PATH: "/data/rembrandt.db"
      BASE_VOCAB_PATH: "${BASE_VOCAB_PATH:-}"
    volumes:
      - botdata:/data
      - "${BASE_VOCAB_PATH:-.}:/data/vocab:ro"
    restart: unless-stopped

volumes:
  botdata:
